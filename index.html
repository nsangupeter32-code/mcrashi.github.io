<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>MCRSAHI</title>
    <style>
        .logo {
            height: 50px;  /* Adjust height for logo size */
            width: auto;   /* Keep aspect ratio */
            display: inline-block; /* Align with text */
        }
        @media (max-width: 600px) {
            .logo {
                height: 40px;  /* Smaller logo for mobile */
            }
        }
    </style>
</head>
<body>
    <nav>
        <img src="moonga-logo.png" alt="Logo" class="logo"> <!-- Integrated in navigation bar -->
        <span>MCRSAHI</span>
    </nav>
    <div class="hero">
        <img src="moonga-logo.png" alt="Logo" class="logo"> <!-- Integrated in hero section -->
        <h1>Welcome to MCRSAHI</h1>
    </div>
    <footer>
        <img src="moonga-logo.png" alt="Logo" class="logo"> <!-- Integrated in footer -->
        <p>&copy; 2026 MCRSAHI</p>
    </footer>
</body>
</html>
